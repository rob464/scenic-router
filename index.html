<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Scenic Router</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCNGxoiKjhICp-Qt2FHpn4XuXd0Nngf34g&libraries=places"></script>

<style>
body {font-family:sans-serif;margin:0;}
#top{padding:10px}
#map{height:90vh}
</style>
</head>

<body>

<div id="top">
<input id="origin" placeholder="Start"/>
<input id="destination" placeholder="End"/>
<button onclick="go()">Find Scenic Route</button>
</div>

<div id="map"></div>

<script>

let map;
let directionsService;
let directionsRenderer;

function init(){

map = new google.maps.Map(document.getElementById("map"),{
center:{lat:53.3498,lng:-6.2603},
zoom:7
});

directionsService = new google.maps.DirectionsService();
directionsRenderer = new google.maps.DirectionsRenderer({map});

}

function go(){

let origin=document.getElementById("origin").value;
let destination=document.getElementById("destination").value;

directionsService.route({
origin:origin,
destination:destination,
travelMode:"DRIVING",
provideRouteAlternatives:true
},function(result,status){

if(status==="OK"){
directionsRenderer.setDirections(result);
}

});

}

window.onload=init;

</script>

</body>
</html>
