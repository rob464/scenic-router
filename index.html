<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scenic Router</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #fff;
      color: #222;
    }

    #top {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    input, button {
      padding: 10px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: white;
      border: none;
    }

    #meta {
      padding: 12px;
      color: #444;
      font-size: 13px;
    }

    .muted {
      color: #666;
    }

    #progressWrap {
      padding: 0 12px 12px;
      display: none;
    }

    #progressLabel {
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
      display: block;
    }

    #progressOuter {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #2563eb;
      transition: width 0.2s ease;
    }

    #map {
      height: calc(100vh - 150px);
      min-height: 420px;
    }
  </style>

  <script>
    // PASTE YOUR GOOGLE MAPS API KEY HERE
    const MAPS_KEY = "AIzaSyCNGxoiKjhICp-Qt2FHpn4XuXd0Nngf34g";

    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=places&v=weekly`;
    script.defer = true;
    document.head.appendChild(script);
  </script>
</head>
<body>
  <div id="top">
    <input id="origin" placeholder="Start (e.g. Dublin)" />
    <input id="destination" placeholder="End (e.g. Galway)" />
    <button id="go">Find Scenic Route</button>
  </div>

  <div id="meta" class="muted">Enter an origin and destination.</div>

  <div id="progressWrap">
    <span id="progressLabel">Scoring routes...</span>
    <div id="progressOuter">
      <div id="progressBar"></div>
    </div>
  </div>

  <div id="map"></div>

  <script>
    let map, directionsService, directionsRenderer, placesService;
    let scenicMarkers = [];
    let scenicInfoWindow;

    // Stronger scenic bias
    const SCENIC_TYPES = ["tourist_attraction", "park"];
    const RADIUS_METERS = 600;
    const SAMPLE_EVERY_METERS = 6000;
    const MAX_SAMPLES = 7;

    const placeCache = new Map();

    function showProgress() {
      document.getElementById("progressWrap").style.display = "block";
    }

    function hideProgress() {
      document.getElementById("progressWrap").style.display = "none";
    }

    function resetProgressBar() {
      const bar = document.getElementById("progressBar");
      bar.style.width = "0%";
      bar.style.background = "#2563eb";
    }

    function updateProgress(current, total, label) {
      const pct = total > 0 ? Math.round((current / total) * 100) : 0;
      document.getElementById("progressBar").style.width = `${pct}%`;
      document.getElementById("progressLabel").textContent = label || `Scoring... ${pct}%`;
    }

    function finishProgress() {
      const bar = document.getElementById("progressBar");
      bar.style.width = "100%";
      bar.style.background = "#16a34a";
      document.getElementById("progressLabel").textContent = "Done";
      setTimeout(hideProgress, 900);
    }

    function fmtKm(m) {
      return `${(m / 1000).toFixed(1)} km`;
    }

    function fmtMin(s) {
      return `${Math.round(s / 60)} min`;
    }

    function haversineMeters(a, b) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);

      const s =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;

      return 2 * R * Math.asin(Math.min(1, Math.sqrt(s)));
    }

    function routeToPoints(route) {
      if (route?.overview_path?.length) {
        return route.overview_path.map(p => ({
          lat: typeof p.lat === "function" ? p.lat() : p.lat,
          lng: typeof p.lng === "function" ? p.lng() : p.lng
        }));
      }
      return [];
    }

    function sampleAlongPath(points, everyMeters = SAMPLE_EVERY_METERS, maxSamples = MAX_SAMPLES) {
      if (!points || points.length === 0) return [];
      if (points.length === 1) return [points[0]];

      const samples = [points[0]];
      let acc = 0;

      for (let i = 1; i < points.length; i++) {
        acc += haversineMeters(points[i - 1], points[i]);
        if (acc >= everyMeters) {
          samples.push(points[i]);
          acc = 0;
          if (samples.length >= maxSamples - 1) break;
        }
      }

      const last = points[points.length - 1];
      const prev = samples[samples.length - 1];
      if (!prev || haversineMeters(prev, last) > 50) {
        samples.push(last);
      }

      return samples.slice(0, maxSamples);
    }

    function cacheKey(lat, lng, type) {
      return `${lat.toFixed(3)},${lng.toFixed(3)},${RADIUS_METERS},${type}`;
    }

    function nearbySearch(placesService, location, radius, type) {
      return new Promise((resolve) => {
        let done = false;

        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          resolve([]);
        }, 3500);

        placesService.nearbySearch(
          { location, radius, type },
          (results, status) => {
            if (done) return;
            done = true;
            clearTimeout(timer);

            if (status === google.maps.places.PlacesServiceStatus.OK && results) {
              resolve(results);
            } else {
              resolve([]);
            }
          }
        );
      });
    }

    function uniqByPlaceId(items) {
      const out = new Map();
      for (const item of items) {
        if (item?.place_id && !out.has(item.place_id)) {
          out.set(item.place_id, item);
        }
      }
      return [...out.values()];
    }

    function clearScenicMarkers() {
      for (const marker of scenicMarkers) marker.setMap(null);
      scenicMarkers = [];
    }

    function addScenicMarkers(places) {
      clearScenicMarkers();

      const topPlaces = places.slice(0, 8);

      for (const place of topPlaces) {
        const loc = place.geometry?.location;
        if (!loc) continue;

        const marker = new google.maps.Marker({
          map,
          position: loc,
          title: place.name,
          label: "★"
        });

        marker.addListener("click", () => {
          scenicInfoWindow.setContent(`
            <div style="font-size:13px; max-width:220px;">
              <strong>${place.name || "Scenic place"}</strong><br>
              Rating: ${place.rating ?? "n/a"}<br>
              Reviews: ${place.user_ratings_total ?? 0}
            </div>
          `);
          scenicInfoWindow.open(map, marker);
        });

        scenicMarkers.push(marker);
      }
    }

    function stripHtml(html) {
      const div = document.createElement("div");
      div.innerHTML = html || "";
      return div.textContent || div.innerText || "";
    }

    function isMotorwayText(text) {
      if (!text) return false;
      const t = text.toLowerCase();

      return (
        t.includes("motorway") ||
        /\bm\d+\b/i.test(text) ||
        t.includes("merge onto m") ||
        t.includes("take the ramp") ||
        t.includes("slip road")
      );
    }

    function getStepText(step) {
      return `${stripHtml(step?.instructions || "")} ${step?.maneuver || ""}`;
    }

    function getRouteMotorwayStats(route) {
      const leg = route?.legs?.[0];
      const steps = leg?.steps || [];

      let motorwayMeters = 0;
      let totalMeters = 0;

      for (const step of steps) {
        const dist = step?.distance?.value ?? 0;
        totalMeters += dist;

        if (isMotorwayText(getStepText(step))) {
          motorwayMeters += dist;
        }
      }

      return {
        motorwayMeters,
        totalMeters,
        motorwayRatio: totalMeters > 0 ? motorwayMeters / totalMeters : 0
      };
    }

    function findNearestStep(sample, route) {
      const steps = route?.legs?.[0]?.steps || [];
      let best = null;
      let bestDist = Infinity;

      for (const step of steps) {
        const stepPath = step?.path || [];
        for (const p of stepPath) {
          const point = {
            lat: typeof p.lat === "function" ? p.lat() : p.lat,
            lng: typeof p.lng === "function" ? p.lng() : p.lng
          };
          const d = haversineMeters(sample, point);
          if (d < bestDist) {
            bestDist = d;
            best = step;
          }
        }
      }

      return { step: best, distance: bestDist };
    }

    function isSampleOnMotorway(sample, route) {
      const nearest = findNearestStep(sample, route);
      if (!nearest.step) return false;
      return isMotorwayText(getStepText(nearest.step));
    }

    async function scenicPlacesAtPoint({ placesService, lat, lng }) {
      const all = [];

      for (const type of SCENIC_TYPES) {
        const key = cacheKey(lat, lng, type);

        if (placeCache.has(key)) {
          all.push(...placeCache.get(key));
          continue;
        }

        const results = await nearbySearch(
          placesService,
          new google.maps.LatLng(lat, lng),
          RADIUS_METERS,
          type
        );

        placeCache.set(key, results);
        all.push(...results);
      }

      return all;
    }

    async function scoreRoute({ route, placesService, onProgress, samplesOverride }) {
      const path = routeToPoints(route);
      const samples = samplesOverride || sampleAlongPath(path, SAMPLE_EVERY_METERS, MAX_SAMPLES);

      let places = [];
      let scenicSamplesUsed = 0;
      let motorwaySamplesSkipped = 0;

      for (let idx = 0; idx < samples.length; idx++) {
        onProgress?.(idx + 1, samples.length);

        const point = samples[idx];

        if (isSampleOnMotorway(point, route)) {
          motorwaySamplesSkipped += 1;
          continue;
        }

        scenicSamplesUsed += 1;

        const results = await scenicPlacesAtPoint({
          placesService,
          lat: point.lat,
          lng: point.lng
        });

        places.push(...results);
      }

      const unique = uniqByPlaceId(places);

      let ratingBonus = 0;
      for (const p of unique) {
        const r = typeof p.rating === "number" ? p.rating : 0;
        const v = typeof p.user_ratings_total === "number" ? p.user_ratings_total : 0;
        if (r >= 4.3) ratingBonus += 1;
        if (v >= 200) ratingBonus += 1;
      }

      const leg = route.legs?.[0];
      const distance = leg?.distance?.value ?? 0;
      const duration = leg?.duration?.value ?? 0;

      const motorwayStats = getRouteMotorwayStats(route);

      // Much stronger motorway penalty
      const motorwayPenalty = motorwayStats.motorwayRatio * 220;

      return {
        scenicCount: unique.length,
        ratingBonus,
        rawScenic: unique.length + ratingBonus,
        distance,
        duration,
        samplesUsed: samples.length,
        scenicSamplesUsed,
        motorwaySamplesSkipped,
        scenicPlaces: unique,
        motorwayMeters: motorwayStats.motorwayMeters,
        motorwayRatio: motorwayStats.motorwayRatio,
        motorwayPenalty
      };
    }

    function detourPenalty(candidate, baseline) {
      const detourDist = (candidate.distance - baseline.distance) / Math.max(1, baseline.distance);
      const detourDur = (candidate.duration - baseline.duration) / Math.max(1, baseline.duration);

      // Still penalize silly detours, but less aggressively than before
      // so scenic routes actually get a chance.
      return detourDist * 8 + detourDur * 5;
    }

    async function waitForGoogle() {
      while (!(window.google && window.google.maps && window.google.maps.places)) {
        await new Promise(r => setTimeout(r, 25));
      }
    }

    async function getDirectionsVariants(origin, destination) {
      const baseRequest = {
        origin,
        destination,
        travelMode: google.maps.TravelMode.DRIVING,
        provideRouteAlternatives: true
      };

      const normalPromise = directionsService.route(baseRequest);
      const scenicPromise = directionsService.route({
        ...baseRequest,
        avoidHighways: true
      });

      const results = await Promise.allSettled([normalPromise, scenicPromise]);

      const routeEntries = [];

      for (const result of results) {
        if (result.status !== "fulfilled") continue;

        const dirRes = result.value;
        const routes = dirRes.routes || [];

        for (let i = 0; i < routes.length; i++) {
          routeEntries.push({
            route: routes[i],
            directionsResult: dirRes,
            routeIndex: i
          });
        }
      }

      return routeEntries;
    }

    async function init() {
      await waitForGoogle();

      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 53.3498, lng: -6.2603 },
        zoom: 7
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        map,
        suppressMarkers: false
      });
      placesService = new google.maps.places.PlacesService(map);
      scenicInfoWindow = new google.maps.InfoWindow();

      document.getElementById("go").addEventListener("click", onGo);
    }

    async function onGo() {
      const meta = document.getElementById("meta");
      const origin = document.getElementById("origin").value.trim();
      const destination = document.getElementById("destination").value.trim();

      clearScenicMarkers();

      if (!origin || !destination) {
        meta.textContent = "Please enter both origin and destination.";
        return;
      }

      resetProgressBar();
      showProgress();
      updateProgress(0, 1, "Getting route options...");
      meta.textContent = "Getting routes…";

      let routeEntries;
      try {
        routeEntries = await getDirectionsVariants(origin, destination);
      } catch (e) {
        hideProgress();
        meta.textContent = "Couldn’t get routes. Check your API key and that Maps JavaScript, Places, and Directions are enabled.";
        return;
      }

      if (!routeEntries.length) {
        hideProgress();
        meta.textContent = "No routes found.";
        return;
      }

      const baseline = routeEntries
        .map(entry => ({
          distance: entry.route?.legs?.[0]?.distance?.value ?? Infinity,
          duration: entry.route?.legs?.[0]?.duration?.value ?? Infinity
        }))
        .reduce((a, b) => (b.duration < a.duration ? b : a));

      const routeSamples = routeEntries.map(entry => {
        const path = routeToPoints(entry.route);
        return sampleAlongPath(path, SAMPLE_EVERY_METERS, MAX_SAMPLES);
      });

      const totalSteps = routeSamples.reduce((sum, samples) => sum + samples.length, 0) || 1;
      let completedSteps = 0;

      const scored = [];

      for (let i = 0; i < routeEntries.length; i++) {
        const entry = routeEntries[i];

        const result = await scoreRoute({
          route: entry.route,
          placesService,
          samplesOverride: routeSamples[i],
          onProgress: (step, totalForRoute) => {
            updateProgress(
              completedSteps + step,
              totalSteps,
              `Scoring route ${i + 1} of ${routeEntries.length} — area ${step} of ${totalForRoute}`
            );
          }
        });

        completedSteps += routeSamples[i].length;

        const detour = detourPenalty(result, baseline);
        let finalScore = result.rawScenic - detour - result.motorwayPenalty;

        // Hard downgrade for motorway-dominant routes when alternatives exist
        if (result.motorwayRatio > 0.55 && routeEntries.length > 1) {
          finalScore -= 80;
        }

        scored.push({
          ...entry,
          ...result,
          detourPenaltyValue: detour,
          finalScore
        });
      }

      scored.sort((a, b) => b.finalScore - a.finalScore);
      const winner = scored[0];

      directionsRenderer.setDirections(winner.directionsResult);
      directionsRenderer.setRouteIndex(winner.routeIndex);

      addScenicMarkers(winner.scenicPlaces);
      finishProgress();

      meta.innerHTML = `
        <div><b>Chosen scenic route</b> (route #${winner.routeIndex + 1} of ${winner.directionsResult.routes.length})</div>
        <div>${fmtKm(winner.distance)} • ${fmtMin(winner.duration)}</div>
        <div class="muted">
          Scenic places: ${winner.scenicCount} • Bonus: ${winner.ratingBonus}
          • Samples checked: ${winner.samplesUsed}
          • Scenic samples used: ${winner.scenicSamplesUsed}
          • Motorway samples skipped: ${winner.motorwaySamplesSkipped}
          • Total route options considered: ${routeEntries.length}
          • Motorway share: ${(winner.motorwayRatio * 100).toFixed(0)}%
          • Motorway penalty: ${winner.motorwayPenalty.toFixed(1)}
          • Detour penalty: ${winner.detourPenaltyValue.toFixed(2)}
          • Final score: ${winner.finalScore.toFixed(2)}
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
