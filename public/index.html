<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scenic Router</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #fff;
      color: #222;
    }

    #top {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    input, button {
      padding: 10px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: white;
      border: none;
      white-space: nowrap;
    }

    #meta {
      padding: 12px;
      color: #444;
      font-size: 13px;
      line-height: 1.45;
    }

    .muted {
      color: #666;
    }

    #whyBox {
      margin-top: 10px;
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      line-height: 1.5;
    }

    #progressWrap {
      padding: 0 12px 12px;
      display: none;
    }

    #progressLabel {
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
      display: block;
    }

    #progressOuter {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #2563eb;
      transition: width 0.2s ease;
    }

    #map {
      height: calc(100vh - 220px);
      min-height: 420px;
    }

    @media (max-width: 900px) {
      #top {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>

  <script>
    const MAPS_KEY = "AIzaSyCNGxoiKjhICp-Qt2FHpn4XuXd0Nngf34g";

    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=places&v=weekly`;
    script.defer = true;
    document.head.appendChild(script);
  </script>
</head>
<body>
  <div id="top">
    <input id="origin" placeholder="Start (e.g. Dublin)" />
    <input id="destination" placeholder="End (e.g. Galway)" />
    <button id="go">Find Scenic Route</button>
    <button id="shareRoute" type="button">Copy Share Link</button>
    <button id="openMaps" type="button">Open in Google Maps</button>
  </div>

  <div id="meta" class="muted">Enter an origin and destination.</div>

  <div id="progressWrap">
    <span id="progressLabel">Scoring routes...</span>
    <div id="progressOuter">
      <div id="progressBar"></div>
    </div>
  </div>

  <div id="map"></div>

  <script>
    let map, directionsService, directionsRenderer, placesService;
    let scenicMarkers = [];
    let scenicInfoWindow;
    let failteAttractions = [];

    let lastWinner = null;
    let lastOrigin = "";
    let lastDestination = "";

    const SCENIC_TYPES = ["natural_feature", "park", "tourist_attraction"];
    const RADIUS_METERS = 600;
    const MAX_SAMPLES = 4;

    const placeCache = new Map();

    function showProgress() {
      document.getElementById("progressWrap").style.display = "block";
    }

    function hideProgress() {
      document.getElementById("progressWrap").style.display = "none";
    }

    function resetProgressBar() {
      const bar = document.getElementById("progressBar");
      bar.style.width = "0%";
      bar.style.background = "#2563eb";
    }

    function updateProgress(current, total, label) {
      const pct = total > 0 ? Math.round((current / total) * 100) : 0;
      document.getElementById("progressBar").style.width = `${pct}%`;
      document.getElementById("progressLabel").textContent = label || `Scoring... ${pct}%`;
    }

    function finishProgress() {
      const bar = document.getElementById("progressBar");
      bar.style.width = "100%";
      bar.style.background = "#16a34a";
      document.getElementById("progressLabel").textContent = "Done";
      setTimeout(hideProgress, 900);
    }

    function fmtKm(m) {
      return `${(m / 1000).toFixed(1)} km`;
    }

    function fmtMin(s) {
      return `${Math.round(s / 60)} min`;
    }

    function stripHtml(html) {
      const div = document.createElement("div");
      div.innerHTML = html || "";
      return div.textContent || div.innerText || "";
    }

    function haversineMeters(a, b) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);

      const s =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;

      return 2 * R * Math.asin(Math.min(1, Math.sqrt(s)));
    }

    function routeToPoints(route) {
      if (route?.overview_path?.length) {
        return route.overview_path.map(p => ({
          lat: typeof p.lat === "function" ? p.lat() : p.lat,
          lng: typeof p.lng === "function" ? p.lng() : p.lng
        }));
      }
      return [];
    }

    function sampleAlongPath(points, maxSamples = MAX_SAMPLES) {
      if (!points || points.length === 0) return [];
      if (points.length <= 2) {
        return points.map((p, i) => ({
          ...p,
          routeProgress: points.length === 1 ? 0.5 : i / (points.length - 1)
        }));
      }

      const cumulative = [0];
      let total = 0;

      for (let i = 1; i < points.length; i++) {
        total += haversineMeters(points[i - 1], points[i]);
        cumulative.push(total);
      }

      if (total === 0) {
        return [{ ...points[0], routeProgress: 0.5 }];
      }

      const startPct = 0.18;
      const endPct = 0.82;

      const samples = [];
      for (let i = 0; i < maxSamples; i++) {
        const t = startPct + ((endPct - startPct) * i) / Math.max(1, maxSamples - 1);
        const targetDist = total * t;

        let bestIdx = 0;
        let bestDiff = Infinity;

        for (let j = 0; j < cumulative.length; j++) {
          const diff = Math.abs(cumulative[j] - targetDist);
          if (diff < bestDiff) {
            bestDiff = diff;
            bestIdx = j;
          }
        }

        samples.push({
          ...points[bestIdx],
          routeProgress: t
        });
      }

      return samples;
    }

    function progressWeight(progress) {
      const distanceFromMiddle = Math.abs(progress - 0.5);

      if (distanceFromMiddle < 0.15) return 1.6;
      if (distanceFromMiddle < 0.25) return 1.25;
      if (distanceFromMiddle < 0.35) return 1.0;
      return 0.6;
    }

    function cacheKey(lat, lng, type) {
      return `${lat.toFixed(3)},${lng.toFixed(3)},${RADIUS_METERS},${type}`;
    }

    function isMotorwayText(text) {
      if (!text) return false;
      const t = text.toLowerCase();

      return (
        t.includes("motorway") ||
        /\bm\d+\b/i.test(text) ||
        t.includes("merge onto m") ||
        t.includes("take the ramp") ||
        t.includes("slip road")
      );
    }

    function getStepText(step) {
      return `${stripHtml(step?.instructions || "")} ${step?.maneuver || ""}`.trim();
    }

    function getRouteMotorwayStats(route) {
      const leg = route?.legs?.[0];
      const steps = leg?.steps || [];

      let motorwayMeters = 0;
      let totalMeters = 0;

      for (const step of steps) {
        const dist = step?.distance?.value ?? 0;
        totalMeters += dist;

        if (isMotorwayText(getStepText(step))) {
          motorwayMeters += dist;
        }
      }

      return {
        motorwayMeters,
        totalMeters,
        motorwayRatio: totalMeters > 0 ? motorwayMeters / totalMeters : 0
      };
    }

    function findNearestStep(sample, route) {
      const steps = route?.legs?.[0]?.steps || [];
      let best = null;
      let bestDist = Infinity;

      for (const step of steps) {
        const stepPath = step?.path || [];
        for (const p of stepPath) {
          const point = {
            lat: typeof p.lat === "function" ? p.lat() : p.lat,
            lng: typeof p.lng === "function" ? p.lng() : p.lng
          };
          const d = haversineMeters(sample, point);
          if (d < bestDist) {
            bestDist = d;
            best = step;
          }
        }
      }

      return { step: best, distance: bestDist };
    }

    function isSampleOnMotorway(sample, route) {
      const nearest = findNearestStep(sample, route);
      if (!nearest.step) return false;
      return isMotorwayText(getStepText(nearest.step));
    }

    function nearbySearch(placesService, location, radius, type) {
      return new Promise((resolve) => {
        let done = false;

        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          resolve([]);
        }, 3500);

        placesService.nearbySearch(
          { location, radius, type },
          (results, status) => {
            if (done) return;
            done = true;
            clearTimeout(timer);

            if (status === google.maps.places.PlacesServiceStatus.OK && results) {
              resolve(results);
            } else {
              resolve([]);
            }
          }
        );
      });
    }

    async function loadFailteCsv() {
      try {
        const res = await fetch("/attractions.csv");
        if (!res.ok) throw new Error(`CSV load failed: ${res.status}`);
        const text = await res.text();
        failteAttractions = parseCsv(text);
        console.log("Loaded Fáilte attractions:", failteAttractions.length);
      } catch (err) {
        console.warn("Could not load attractions.csv", err);
        failteAttractions = [];
      }
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        if (row.some(v => v.trim() !== "")) rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = (cols[idx] || "").trim();
        });
        return obj;
      });
    }

    function normalizeName(s) {
      return (s || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9 ]/g, " ")
        .replace(/\b(visitor centre|visitor center|office|official site)\b/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getPlaceLatLng(place) {
      const loc = place.geometry?.location;
      if (!loc) return null;
      return {
        lat: typeof loc.lat === "function" ? loc.lat() : loc.lat,
        lng: typeof loc.lng === "function" ? loc.lng() : loc.lng
      };
    }

    function parseNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function getCsvLatLng(row) {
      const lat = parseNumber(
        row.latitude || row.Latitude || row.lat || row.Lat || row["geo_lat"]
      );
      const lng = parseNumber(
        row.longitude || row.Longitude || row.lng || row.Lng || row.lon || row.Long || row["geo_long"]
      );

      if (lat == null || lng == null) return null;
      return { lat, lng };
    }

    function getCsvName(row) {
      return (
        row.name ||
        row.Name ||
        row.title ||
        row.Title ||
        row.BusinessName ||
        row.business_name ||
        ""
      );
    }

    function matchFailteAttraction(place) {
      if (!failteAttractions.length) return null;

      const placeName = normalizeName(place.name || "");
      const placePoint = getPlaceLatLng(place);
      if (!placeName || !placePoint) return null;

      let best = null;
      let bestScore = -Infinity;

      for (const row of failteAttractions) {
        const csvNameRaw = getCsvName(row);
        const csvName = normalizeName(csvNameRaw);
        if (!csvName) continue;

        const csvPoint = getCsvLatLng(row);
        if (!csvPoint) continue;

        const dist = haversineMeters(placePoint, csvPoint);

        let nameScore = 0;
        if (placeName === csvName) nameScore = 100;
        else if (placeName.includes(csvName) || csvName.includes(placeName)) nameScore = 70;
        else continue;

        if (dist > 2000) continue;

        const score = nameScore - dist / 50;

        if (score > bestScore) {
          bestScore = score;
          best = {
            row,
            distanceMeters: dist,
            matchedName: csvNameRaw
          };
        }
      }

      return best;
    }

    function isNonScenicCommercial(place) {
      const types = place.types || [];
      const name = (place.name || "").toLowerCase();

      const badTypes = [
        "travel_agency",
        "real_estate_agency",
        "insurance_agency",
        "finance",
        "accounting",
        "car_dealer",
        "store",
        "lodging"
      ];

      const badWords = [
        "office",
        "tour operator",
        "tours",
        "travel",
        "booking",
        "agency",
        "visitor centre",
        "visitor center"
      ];

      if (types.some(t => badTypes.includes(t))) return true;
      if (badWords.some(word => name.includes(word))) return true;

      return false;
    }

    function isClosedPlace(place) {
      return place.business_status === "CLOSED_PERMANENTLY";
    }

    function coastalKeywordScore(place) {
      const name = (place.name || "").toLowerCase();
      const types = place.types || [];
      let score = 0;

      if (/\bbeach\b|\bcoast\b|\bcliff\b|\bharbour\b|\bharbor\b|\bmarina\b|\bpier\b|\bbay\b|\blighthouse\b|\bcove\b|\bstrand\b/.test(name)) {
        score += 12;
      }

      if (types.includes("natural_feature")) {
        if (/\bbeach\b|\bcliff\b|\bbay\b|\bcove\b/.test(name)) {
          score += 8;
        }
      }

      return score;
    }

    function placeWeight(place, queriedType = "") {
      if (isNonScenicCommercial(place)) return -10;
      if (isClosedPlace(place)) return -10;

      const name = (place.name || "").toLowerCase();
      const types = place.types || [];
      let score = 0;

      if (queriedType === "natural_feature" || types.includes("natural_feature")) score += 12;
      if (queriedType === "park" || types.includes("park")) score += 8;
      if (queriedType === "tourist_attraction" || types.includes("tourist_attraction")) score += 3;

      if (/\blake\b|\blough\b|\bforest\b|\bwoods\b|\bmountain\b|\bcliff\b|\bfalls\b|\bwaterfall\b|\bbeach\b|\bcoast\b|\bharbour\b|\bharbor\b|\briver\b/.test(name)) {
        score += 8;
      }

      score += coastalKeywordScore(place);

      if (/\babbey\b|\bcastle\b|\bmonument\b|\bcathedral\b|\bfort\b|\bheritage\b|\bhistoric\b/.test(name)) {
        score += 3;
      }

      const failteMatch = matchFailteAttraction(place);
      if (failteMatch) {
        score += 20;

        if (/\blake\b|\blough\b|\bforest\b|\bwoods\b|\bmountain\b|\bcliff\b|\bfalls\b|\bwaterfall\b|\bbeach\b|\bcoast\b|\bharbour\b|\bharbor\b|\briver\b|\bbay\b|\bcove\b|\blighthouse\b|\bstrand\b/.test(name)) {
          score += 10;
        }

        place.failteMatch = failteMatch;
      }

      return score;
    }

    function uniqBestPlaces(items) {
      const best = new Map();

      for (const item of items) {
        if (!item?.place_id) continue;
        const existing = best.get(item.place_id);
        if (!existing || (item.scenicWeight || 0) > (existing.scenicWeight || 0)) {
          best.set(item.place_id, item);
        }
      }

      return [...best.values()];
    }

    function clearScenicMarkers() {
      for (const marker of scenicMarkers) marker.setMap(null);
      scenicMarkers = [];
    }

    function addScenicMarkers(places) {
      clearScenicMarkers();

      const topPlaces = [...places]
        .sort((a, b) => (b.scenicWeight || 0) - (a.scenicWeight || 0))
        .slice(0, 8);

      for (const place of topPlaces) {
        const loc = place.geometry?.location;
        if (!loc) continue;

        const marker = new google.maps.Marker({
          map,
          position: loc,
          title: place.name,
          label: "★"
        });

        marker.addListener("click", () => {
          const failteLine = place.failteMatch
            ? `<br>Fáilte Ireland match: ${place.failteMatch.matchedName}`
            : "";

          scenicInfoWindow.setContent(`
            <div style="font-size:13px; max-width:220px;">
              <strong>${place.name || "Scenic place"}</strong><br>
              Scenic score: ${place.scenicWeight ?? 0}<br>
              Rating: ${place.rating ?? "n/a"}<br>
              Reviews: ${place.user_ratings_total ?? 0}
              ${failteLine}
            </div>
          `);
          scenicInfoWindow.open(map, marker);
        });

        scenicMarkers.push(marker);
      }
    }

    async function scenicPlacesAtPoint({ placesService, lat, lng }) {
      const all = [];

      for (const type of SCENIC_TYPES) {
        const key = cacheKey(lat, lng, type);

        let results;
        if (placeCache.has(key)) {
          results = placeCache.get(key);
        } else {
          results = await nearbySearch(
            placesService,
            new google.maps.LatLng(lat, lng),
            RADIUS_METERS,
            type
          );
          placeCache.set(key, results);
        }

        for (const place of results) {
          const scenicWeight = placeWeight(place, type);
          if (scenicWeight <= 0) continue;
          all.push({ ...place, scenicWeight });
        }
      }

      return all;
    }

    function rankScenicPlaces(places) {
      return [...places].sort((a, b) => {
        const aScore = (a.scenicWeight || 0) + (a.rating || 0) + Math.min(Math.log10((a.user_ratings_total || 0) + 1), 3);
        const bScore = (b.scenicWeight || 0) + (b.rating || 0) + Math.min(Math.log10((b.user_ratings_total || 0) + 1), 3);
        return bScore - aScore;
      });
    }

    function describePlace(place) {
      const name = place.name || "a scenic place";
      const lower = name.toLowerCase();

      if (/\blake\b|\blough\b/.test(lower)) return `the lake ${name}`;
      if (/\bforest\b|\bwoods\b/.test(lower)) return `the forest area around ${name}`;
      if (/\bbeach\b|\bstrand\b/.test(lower)) return `the coast near ${name}`;
      if (/\bcliff\b|\bbay\b|\bcove\b/.test(lower)) return name;
      if ((place.types || []).includes("natural_feature")) return `the natural landmark ${name}`;
      if ((place.types || []).includes("park")) return `the park ${name}`;
      return name;
    }

    function findMotorwayExitMoment(route) {
      const steps = route?.legs?.[0]?.steps || [];
      let seenMotorway = false;

      for (let i = 0; i < steps.length; i++) {
        const currentIsMotorway = isMotorwayText(getStepText(steps[i]));

        if (currentIsMotorway) {
          seenMotorway = true;
          continue;
        }

        if (seenMotorway && !currentIsMotorway) {
          const text = stripHtml(steps[i].instructions || "");
          return text || "leave the motorway for quieter roads";
        }
      }

      return "";
    }

    function findLongestNonMotorwayStep(route) {
      const steps = route?.legs?.[0]?.steps || [];
      let bestStep = null;
      let bestDistance = 0;

      for (const step of steps) {
        if (isMotorwayText(getStepText(step))) continue;
        const dist = step?.distance?.value ?? 0;
        if (dist > bestDistance) {
          bestDistance = dist;
          bestStep = step;
        }
      }

      return bestStep;
    }

    function buildRouteExplanation(route, scenicPlaces, scoreData) {
      const ranked = rankScenicPlaces(scenicPlaces).slice(0, 3);
      const failteBoosted = scenicPlaces.filter(p => p.failteMatch).slice(0, 2);
      const exitMoment = findMotorwayExitMoment(route);
      const quietRoadStep = findLongestNonMotorwayStep(route);

      let firstSentence = "";
      if (ranked.length >= 2) {
        firstSentence = `This route was chosen because it stays closer to real scenery, especially ${describePlace(ranked[0])} and ${describePlace(ranked[1])}.`;
      } else if (ranked.length === 1) {
        firstSentence = `This route was chosen because it stays close to ${describePlace(ranked[0])}, which scored highly as a natural or scenic stop.`;
      } else {
        firstSentence = `This route was chosen because it avoids motorway-heavy stretches where possible and leans toward quieter roads.`;
      }

      let failteSentence = "";
      if (failteBoosted.length === 1) {
        failteSentence = `${failteBoosted[0].name} is also listed in the Fáilte Ireland attractions data, which increased its score.`;
      } else if (failteBoosted.length >= 2) {
        failteSentence = `${failteBoosted[0].name} and ${failteBoosted[1].name} are also listed in the Fáilte Ireland attractions data, which increased this route’s score.`;
      }

      let secondSentence = "";
      if (exitMoment) {
        secondSentence = `It leaves the motorway when the directions say “${exitMoment}”, so more of the drive happens on roads where the scenery is actually visible.`;
      }

      let thirdSentence = "";
      if (quietRoadStep) {
        const txt = stripHtml(quietRoadStep.instructions || "");
        if (txt) {
          thirdSentence = `A key scenic section is “${txt}”.`;
        }
      }

      let fourthSentence = "";
      if (typeof scoreData.motorwayRatio === "number") {
        fourthSentence = `About ${Math.round(scoreData.motorwayRatio * 100)}% of the route is motorway, and motorway segments were penalised during scoring.`;
      }

      return [firstSentence, failteSentence, secondSentence, thirdSentence, fourthSentence]
        .filter(Boolean)
        .join(" ");
    }

    function getPlaceContext(place) {
      const vicinity = place.vicinity || place.formatted_address || "";
      return vicinity.trim();
    }

    function buildExplanationFacts(route, scenicPlaces, scoreData, origin, destination) {
      const ranked = rankScenicPlaces(scenicPlaces).slice(0, 3);
      const failteBoosted = scenicPlaces.filter(p => p.failteMatch).slice(0, 2);
      const motorwayExitInstruction = findMotorwayExitMoment(route) || "";
      const quietRoadStep = findLongestNonMotorwayStep(route);
      const quietRoadInstruction = quietRoadStep
        ? stripHtml(quietRoadStep.instructions || "")
        : "";

      return {
        origin,
        destination,
        motorwaySharePercent: Math.round((scoreData.motorwayRatio || 0) * 100),
        motorwayExitInstruction,
        scenicHighlights: ranked.map(p => ({
          name: p.name || "",
          context: getPlaceContext(p),
          scenicWeight: p.scenicWeight || 0
        })).filter(p => p.name),
        failteHighlights: failteBoosted.map(p => ({
          name: p.name || "",
          context: getPlaceContext(p)
        })).filter(p => p.name),
        quietRoadInstruction,
        naturalHighlightsCount: scoreData.naturalCount || 0,
        coastalHighlightsCount: scoreData.coastalCount || 0
      };
    }

    async function getLlmRouteExplanation(facts) {
      try {
        const r = await fetch("/api/explain-route", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(facts)
        });

        const data = await r.json();
        if (!r.ok) {
          console.warn("LLM explanation failed:", data);
          return null;
        }

        return data.explanation || null;
      } catch (err) {
        console.warn("LLM explanation error:", err);
        return null;
      }
    }

    async function scoreRoute({ route, placesService, onProgress, samplesOverride }) {
      const path = routeToPoints(route);
      const samples = samplesOverride || sampleAlongPath(path, MAX_SAMPLES);

      let places = [];
      let scenicSamplesUsed = 0;
      let motorwaySamplesSkipped = 0;

      for (let idx = 0; idx < samples.length; idx++) {
        onProgress?.(idx + 1, samples.length);

        const point = samples[idx];

        if (isSampleOnMotorway(point, route)) {
          motorwaySamplesSkipped += 1;
          continue;
        }

        scenicSamplesUsed += 1;

        const results = await scenicPlacesAtPoint({
          placesService,
          lat: point.lat,
          lng: point.lng
        });

        const weightedResults = results.map(place => ({
          ...place,
          scenicWeight: Math.round((place.scenicWeight || 0) * progressWeight(point.routeProgress ?? 0.5))
        }));

        places.push(...weightedResults);
      }

      const unique = uniqBestPlaces(places);

      let weightedScenicScore = 0;
      let ratingBonus = 0;
      let naturalCount = 0;
      let coastalCount = 0;

      for (const p of unique) {
        weightedScenicScore += p.scenicWeight || 0;

        const r = typeof p.rating === "number" ? p.rating : 0;
        const v = typeof p.user_ratings_total === "number" ? p.user_ratings_total : 0;
        if (r >= 4.3) ratingBonus += 1;
        if (v >= 200) ratingBonus += 1;

        const name = (p.name || "").toLowerCase();
        const types = p.types || [];

        if (
          types.includes("natural_feature") ||
          types.includes("park") ||
          /\blake\b|\blough\b|\bforest\b|\bwoods\b|\bmountain\b|\bcliff\b|\bfalls\b|\bwaterfall\b|\bbeach\b|\bcoast\b|\briver\b/.test(name)
        ) {
          naturalCount += 1;
        }

        if (/\bbeach\b|\bcoast\b|\bcliff\b|\bharbour\b|\bharbor\b|\bmarina\b|\bpier\b|\bbay\b|\blighthouse\b|\bcove\b|\bstrand\b/.test(name)) {
          coastalCount += 1;
        }
      }

      const leg = route.legs?.[0];
      const distance = leg?.distance?.value ?? 0;
      const duration = leg?.duration?.value ?? 0;

      const motorwayStats = getRouteMotorwayStats(route);
      const motorwayPenalty = motorwayStats.motorwayRatio * 220;

      return {
        scenicCount: unique.length,
        naturalCount,
        coastalCount,
        ratingBonus,
        weightedScenicScore,
        rawScenic: weightedScenicScore + ratingBonus,
        distance,
        duration,
        samplesUsed: samples.length,
        scenicSamplesUsed,
        motorwaySamplesSkipped,
        scenicPlaces: unique,
        motorwayMeters: motorwayStats.motorwayMeters,
        motorwayRatio: motorwayStats.motorwayRatio,
        motorwayPenalty
      };
    }

    function detourPenalty(candidate, baseline) {
      const detourDist = (candidate.distance - baseline.distance) / Math.max(1, baseline.distance);
      const detourDur = (candidate.duration - baseline.duration) / Math.max(1, baseline.duration);
      return detourDist * 8 + detourDur * 5;
    }

    async function waitForGoogle() {
      while (!(window.google && window.google.maps && window.google.maps.places)) {
        await new Promise(r => setTimeout(r, 25));
      }
    }

    async function getDirectionsVariants(origin, destination) {
      const baseRequest = {
        origin,
        destination,
        travelMode: google.maps.TravelMode.DRIVING,
        provideRouteAlternatives: true
      };

      const normalPromise = directionsService.route(baseRequest);
      const scenicPromise = directionsService.route({
        ...baseRequest,
        avoidHighways: true
      });

      const results = await Promise.allSettled([normalPromise, scenicPromise]);
      const routeEntries = [];
      const seen = new Set();

      for (const result of results) {
        if (result.status !== "fulfilled") continue;

        const dirRes = result.value;
        const routes = dirRes.routes || [];

        for (let i = 0; i < routes.length; i++) {
          const route = routes[i];
          const leg = route?.legs?.[0];
          const key = `${leg?.distance?.value || 0}-${leg?.duration?.value || 0}-${route.summary || ""}`;

          if (seen.has(key)) continue;
          seen.add(key);

          routeEntries.push({
            route,
            directionsResult: dirRes,
            routeIndex: i
          });
        }
      }

      return routeEntries;
    }

    function safeEncode(value) {
      return encodeURIComponent(value || "");
    }

    function getTopWaypointPlaces(winner, maxWaypoints = 3) {
      return rankScenicPlaces(winner?.scenicPlaces || [])
        .filter(p => p && p.name)
        .slice(0, maxWaypoints);
    }

    function getWaypointParamValue(places) {
      return places
        .map(place => {
          if (place.place_id) return `place_id:${place.place_id}`;
          return place.name || "";
        })
        .filter(Boolean)
        .join("|");
    }

    function buildGoogleMapsUrl(origin, destination, winner) {
      const base = "https://www.google.com/maps/dir/?api=1";
      const waypoints = getTopWaypointPlaces(winner, 3);
      const waypointValue = getWaypointParamValue(waypoints);

      let url =
        `${base}` +
        `&origin=${safeEncode(origin)}` +
        `&destination=${safeEncode(destination)}` +
        `&travelmode=driving`;

      if (waypointValue) {
        url += `&waypoints=${safeEncode(waypointValue)}`;
      }

      return url;
    }

    function buildShareUrl(origin, destination, winner) {
      const url = new URL(window.location.href);
      url.searchParams.set("origin", origin);
      url.searchParams.set("destination", destination);

      const waypoints = getTopWaypointPlaces(winner, 3);
      const waypointValue = getWaypointParamValue(waypoints);

      if (waypointValue) {
        url.searchParams.set("waypoints", waypointValue);
      } else {
        url.searchParams.delete("waypoints");
      }

      return url.toString();
    }

    async function copyShareLink() {
      if (!lastWinner || !lastOrigin || !lastDestination) {
        alert("Find a scenic route first.");
        return;
      }

      const shareUrl = buildShareUrl(lastOrigin, lastDestination, lastWinner);

      try {
        await navigator.clipboard.writeText(shareUrl);
        alert("Share link copied.");
      } catch (err) {
        console.warn("Clipboard copy failed:", err);
        prompt("Copy this link:", shareUrl);
      }
    }

    function openInGoogleMaps() {
      if (!lastWinner || !lastOrigin || !lastDestination) {
        alert("Find a scenic route first.");
        return;
      }

      const mapsUrl = buildGoogleMapsUrl(lastOrigin, lastDestination, lastWinner);
      window.open(mapsUrl, "_blank");
    }

    function loadRouteFromUrl() {
      const url = new URL(window.location.href);
      const origin = url.searchParams.get("origin") || "";
      const destination = url.searchParams.get("destination") || "";

      if (origin) document.getElementById("origin").value = origin;
      if (destination) document.getElementById("destination").value = destination;

      return { origin, destination };
    }

    async function init() {
      await waitForGoogle();
      await loadFailteCsv();

      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 53.3498, lng: -6.2603 },
        zoom: 7
      });

      directionsService = new google.maps.DirectionsService();
      directionsRenderer = new google.maps.DirectionsRenderer({
        map,
        suppressMarkers: false
      });
      placesService = new google.maps.places.PlacesService(map);
      scenicInfoWindow = new google.maps.InfoWindow();

      document.getElementById("go").addEventListener("click", onGo);
      document.getElementById("shareRoute").addEventListener("click", copyShareLink);
      document.getElementById("openMaps").addEventListener("click", openInGoogleMaps);

      const initial = loadRouteFromUrl();
      if (initial.origin && initial.destination) {
        onGo();
      }
    }

    async function onGo() {
      const meta = document.getElementById("meta");
      const origin = document.getElementById("origin").value.trim();
      const destination = document.getElementById("destination").value.trim();

      clearScenicMarkers();

      if (!origin || !destination) {
        meta.textContent = "Please enter both origin and destination.";
        return;
      }

      resetProgressBar();
      showProgress();
      updateProgress(0, 1, "Getting route options...");
      meta.textContent = "Getting routes…";

      let routeEntries;
      try {
        routeEntries = await getDirectionsVariants(origin, destination);
      } catch (e) {
        hideProgress();
        meta.textContent = "Couldn’t get routes. Check your API key and that Maps JavaScript, Places, and Directions are enabled.";
        return;
      }

      if (!routeEntries.length) {
        hideProgress();
        meta.textContent = "No routes found.";
        return;
      }

      const baseline = routeEntries
        .map(entry => ({
          distance: entry.route?.legs?.[0]?.distance?.value ?? Infinity,
          duration: entry.route?.legs?.[0]?.duration?.value ?? Infinity
        }))
        .reduce((a, b) => (b.duration < a.duration ? b : a));

      const routeSamples = routeEntries.map(entry => {
        const path = routeToPoints(entry.route);
        return sampleAlongPath(path, MAX_SAMPLES);
      });

      const totalSteps = routeSamples.reduce((sum, samples) => sum + samples.length, 0) || 1;
      let completedSteps = 0;

      const scored = [];

      for (let i = 0; i < routeEntries.length; i++) {
        const entry = routeEntries[i];

        const result = await scoreRoute({
          route: entry.route,
          placesService,
          samplesOverride: routeSamples[i],
          onProgress: (step, totalForRoute) => {
            updateProgress(
              completedSteps + step,
              totalSteps,
              `Scoring route ${i + 1} of ${routeEntries.length} — area ${step} of ${totalForRoute}`
            );
          }
        });

        completedSteps += routeSamples[i].length;

        const detour = detourPenalty(result, baseline);
        let finalScore = result.rawScenic - detour - result.motorwayPenalty;

        if (result.motorwayRatio > 0.55 && routeEntries.length > 1) {
          finalScore -= 80;
        }

        scored.push({
          ...entry,
          ...result,
          detourPenaltyValue: detour,
          finalScore
        });
      }

      scored.sort((a, b) => b.finalScore - a.finalScore);
      const winner = scored[0];

      lastWinner = winner;
      lastOrigin = origin;
      lastDestination = destination;

      directionsRenderer.setDirections(winner.directionsResult);
      directionsRenderer.setRouteIndex(winner.routeIndex);

      addScenicMarkers(winner.scenicPlaces);
      finishProgress();

      const fallbackExplanation = buildRouteExplanation(winner.route, winner.scenicPlaces, winner);
      const explanationFacts = buildExplanationFacts(
        winner.route,
        winner.scenicPlaces,
        winner,
        origin,
        destination
      );
      const llmExplanation = await getLlmRouteExplanation(explanationFacts);
      const explanation = llmExplanation || fallbackExplanation;

      meta.innerHTML = `
        <div><b>Chosen scenic route</b> (route #${winner.routeIndex + 1} of ${winner.directionsResult.routes.length})</div>
        <div>${fmtKm(winner.distance)} • ${fmtMin(winner.duration)}</div>
        <div class="muted">
          Scenic places: ${winner.scenicCount}
          • Natural highlights: ${winner.naturalCount}
          • Coastal highlights: ${winner.coastalCount}
          • Bonus: ${winner.ratingBonus}
          • Weighted scenic score: ${winner.weightedScenicScore}
          • Samples checked: ${winner.samplesUsed}
          • Scenic samples used: ${winner.scenicSamplesUsed}
          • Motorway samples skipped: ${winner.motorwaySamplesSkipped}
          • Total route options considered: ${routeEntries.length}
          • Motorway share: ${(winner.motorwayRatio * 100).toFixed(0)}%
          • Motorway penalty: ${winner.motorwayPenalty.toFixed(1)}
          • Detour penalty: ${winner.detourPenaltyValue.toFixed(2)}
          • Final score: ${winner.finalScore.toFixed(2)}
        </div>
        <div id="whyBox">
          <b>Why this route?</b><br>
          ${explanation}
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
